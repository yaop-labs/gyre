name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Format
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test with race detector
        run: go test ./... -race -count=1
